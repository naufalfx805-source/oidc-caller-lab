name: Trust Boundary Manual Consumer

on:
  workflow_dispatch:
    inputs:
      scenario:
        required: true
        default: consumer_manual
      producer_run_id:
        required: true
        default: "0"
      cache_key:
        required: true
        default: trust-boundary-cache-shared

permissions:
  contents: read
  actions: read

jobs:
  consume:
    runs-on: ubuntu-latest
    steps:
      - name: Restore cache by requested key
        id: cache_restore
        uses: actions/cache/restore@v4
        with:
          path: restored-cache
          key: ${{ inputs.cache_key }}
          restore-keys: |
            ${{ inputs.cache_key }}

      - name: Download and validate exact producer artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          SCENARIO: ${{ inputs.scenario }}
          PRODUCER_RUN_ID: ${{ inputs.producer_run_id }}
          CACHE_KEY: ${{ inputs.cache_key }}
          CACHE_HIT: ${{ steps.cache_restore.outputs.cache-hit }}
          CACHE_PRIMARY_KEY: ${{ steps.cache_restore.outputs.cache-primary-key }}
          CACHE_MATCHED_KEY: ${{ steps.cache_restore.outputs.cache-matched-key }}
        run: |
          set -euo pipefail
          mkdir -p trust-consumer downloaded evidence
          python3 - <<'PY'
          import hashlib, json, os, pathlib, urllib.parse, urllib.request, zipfile
          class StripAuthRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl):
                  new_req = super().redirect_request(req, fp, code, msg, headers, newurl)
                  if new_req and urllib.parse.urlparse(newurl).netloc != urllib.parse.urlparse(req.full_url).netloc:
                      new_req.remove_header("Authorization")
                  return new_req
          opener = urllib.request.build_opener(StripAuthRedirect)
          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          run_id = os.environ["PRODUCER_RUN_ID"]
          out = pathlib.Path("trust-consumer")
          headers = {
              "Authorization": "Bearer " + token,
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          result = {
              "consumer": {
                  "scenario": os.environ["SCENARIO"],
                  "repository": repo,
                  "repository_id": os.environ["GITHUB_REPOSITORY_ID"],
                  "actor": os.environ["GITHUB_ACTOR"],
                  "actor_id": os.environ["GITHUB_ACTOR_ID"],
                  "ref": os.environ["GITHUB_REF"],
                  "sha": os.environ["GITHUB_SHA"],
                  "workflow_ref": os.environ["GITHUB_WORKFLOW_REF"],
                  "run_id": os.environ["GITHUB_RUN_ID"],
                  "event_name": os.environ["GITHUB_EVENT_NAME"],
              },
              "cache": {
                  "requested_key": os.environ["CACHE_KEY"],
                  "hit": os.environ["CACHE_HIT"],
                  "primary_key": os.environ["CACHE_PRIMARY_KEY"],
                  "matched_key": os.environ["CACHE_MATCHED_KEY"],
              },
              "producer_run_id": run_id,
              "artifacts": [],
          }
          if run_id != "0":
              req = urllib.request.Request(f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/artifacts", headers=headers)
              with opener.open(req, timeout=30) as resp:
                  artifacts = json.loads(resp.read())
              pathlib.Path("trust-consumer/artifacts-list.json").write_text(json.dumps(artifacts, indent=2, sort_keys=True), encoding="utf-8")
              for artifact in artifacts.get("artifacts", []):
                  item = {
                      "id": artifact.get("id"),
                      "name": artifact.get("name"),
                      "digest": artifact.get("digest"),
                      "expired": artifact.get("expired"),
                      "workflow_run": artifact.get("workflow_run"),
                  }
                  archive_req = urllib.request.Request(artifact["archive_download_url"], headers=headers)
                  zip_path = pathlib.Path("downloaded") / f"{artifact['id']}.zip"
                  with opener.open(archive_req, timeout=30) as resp:
                      zip_path.write_bytes(resp.read())
                  extract_dir = pathlib.Path("downloaded") / str(artifact["id"])
                  extract_dir.mkdir(parents=True, exist_ok=True)
                  with zipfile.ZipFile(zip_path) as zf:
                      zf.extractall(extract_dir)
                  manifest_path = extract_dir / "manifest.json"
                  payload_path = extract_dir / "payload.txt"
                  if manifest_path.exists() and payload_path.exists():
                      manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
                      payload_hash = hashlib.sha256(payload_path.read_bytes()).hexdigest()
                      item["manifest"] = manifest
                      item["payload_sha256_actual"] = payload_hash
                      item["payload_sha256_matches_manifest"] = payload_hash == manifest.get("payload_sha256")
                  result["artifacts"].append(item)
          cache_payload = pathlib.Path("restored-cache/cache-payload.txt")
          if cache_payload.exists():
              result["cache"]["payload_sha256"] = hashlib.sha256(cache_payload.read_bytes()).hexdigest()
              result["cache"]["payload_preview"] = cache_payload.read_text(encoding="utf-8")[:2000]
          out.joinpath("consumer-result.json").write_text(json.dumps(result, indent=2, sort_keys=True), encoding="utf-8")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: trust-consumer-result-${{ inputs.scenario }}
          path: trust-consumer/*
          retention-days: 7
